name: DOD Daily Update

# Scheduled: runs every day at 06:30 IST (01:00 UTC) — pulls yesterday
# Manual:    trigger from GitHub UI with a date range to backfill any period
#
# To backfill (e.g. July 3–7):
#   GitHub → Actions → DOD Daily Update → Run workflow
#   date_from: 2026-07-03   date_to: 2026-07-07

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = IST 06:30
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Start date YYYY-MM-DD (leave blank for yesterday)'
        required: false
        default: ''
      date_to:
        description: 'End date YYYY-MM-DD (leave blank = same as date_from)'
        required: false
        default: ''

jobs:
  update-dod:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP service account credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_CLOUD_KEY_JSON }}' > credentials/service_account.json

      - name: Run DOD update (scheduled — yesterday only)
        if: github.event_name == 'schedule'
        env:
          MOENGAGE_APP_ID: ${{ secrets.MOENGAGE_APP_ID }}
          MOENGAGE_SECRET_KEY: ${{ secrets.MOENGAGE_SECRET_KEY }}
          MOENGAGE_DATA_CENTER: api-03
          GCP_PROJECT_ID: copies-qc
          GOOGLE_CLOUD_KEY_PATH: credentials/service_account.json
          BQ_DATASET: pn_report
        run: python run_report.py --api --date yesterday --target dod_daily

      - name: Run DOD update / backfill (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          MOENGAGE_APP_ID: ${{ secrets.MOENGAGE_APP_ID }}
          MOENGAGE_SECRET_KEY: ${{ secrets.MOENGAGE_SECRET_KEY }}
          MOENGAGE_DATA_CENTER: api-03
          GCP_PROJECT_ID: copies-qc
          GOOGLE_CLOUD_KEY_PATH: credentials/service_account.json
          BQ_DATASET: pn_report
        run: |
          python3 -c "
          from datetime import date, timedelta
          import subprocess, sys

          df_input = '${{ github.event.inputs.date_from }}'.strip()
          dt_input = '${{ github.event.inputs.date_to }}'.strip()

          yesterday = (date.today() - timedelta(days=1)).strftime('%Y-%m-%d')
          date_from = df_input if df_input else yesterday
          date_to   = dt_input if dt_input else date_from

          cur = date.fromisoformat(date_from)
          end = date.fromisoformat(date_to)

          print(f'Backfill range: {date_from} → {date_to}')
          while cur <= end:
              print(f'\n── Processing {cur} ──')
              subprocess.run(
                  [sys.executable, 'run_report.py', '--api', '--date', str(cur), '--target', 'dod_daily'],
                  check=True
              )
              cur += timedelta(days=1)
          print(f'\nBackfill complete.')
          "

      - name: Clean up credentials
        if: always()
        run: rm -f credentials/service_account.json
